<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="png" href="/public/favicon.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>16-Bits Blackjack</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <div>
            <div id="overlay-lang" class="col">
                    <h2 class="lang-title row">Elige tu idioma | Choose your language</h2>
                    <button id="btnEs" class="lang-image row"></button>
                    <button id="btnEn" class="lang-image row"></button>
            </div>
        </div>
        <div>
            <img src="./public/assets/images/title.png" class="title" alt="Blackjack">
            <button id="btnStart"></button>
        </div>
            <div id="overlay2" class="row">
                <h1 class="qty-players row"></h1>
                <button id="btn1Player" class="players-btn btn col">1</button>
                    <button id="btn2Player" class="players-btn btn col">2</button>
                    <button id="btn3Player" class="players-btn btn col">3</button>
        </div>
        <div class="col mt-2">
            <div id="buttons" class="row text-center">
                <button id="btnNewGame" class="btn mt-2">Nuevo Juego</button>
                <button id="btnTake" class="btn mt-2">Pedir carta</button>
                <button id="btnStop" class="btn mt-2">Detener</button>
            </div>
        </div>
        <div class="result">
            <div class="row container text-center cards-container">
                <div id="players-container" class="row"></div>
            </div>
        </div>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
